<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MRI 1週間予約表（A4横）</title>
    <style>
        @page { size: A4 landscape; margin: 10mm; }
        body { font-family: sans-serif; font-size: 11px; margin: 0; padding: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid #333; padding: 4px; text-align: center; overflow: hidden; height: 25px; }
        th { background: #eee; height: 30px; }
        .time-col { font-weight: bold; width: 60px; }
        
        .done-past { 
            background-color: #ffcccc !important; 
            -webkit-print-color-adjust: exact; 
            print-color-adjust: exact;
        }

        .total-row { background-color: #f8f9fa; font-weight: bold; }
        .total-label { text-align: right; padding-right: 10px; }

        .no-print { margin-bottom: 10px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="no-print">
        <button onclick="shiftWeek(-1)">◀ 前の週</button>
        <span id="weekTitle" style="margin: 0 15px; font-weight:bold;"></span>
        <button onclick="shiftWeek(1)">次の週 ▶</button>
        <button onclick="window.print()">🖨️ A4横で印刷</button>
    </div>

    <table>
        <thead><tr id="headerRow"><th>時間</th></tr></thead>
        <tbody id="bodyRows"></tbody>
        <tfoot>
            <tr id="totalRow" class="total-row">
                <td class="total-label">合計</td>
            </tr>
        </tfoot>
    </table>

    <script>
        let monday = getMonday(new Date());
        function getMonday(d) { 
            let date = new Date(d);
            let day = date.getDay(), diff = date.getDate() - day + (day == 0 ? -6 : 1); 
            return new Date(date.setDate(diff)); 
        }
        
        async function load() {
            const hRow = document.getElementById("headerRow");
            const bRows = document.getElementById("bodyRows");
            const tRow = document.getElementById("totalRow");
            
            hRow.innerHTML = "<th>時間</th>"; 
            bRows.innerHTML = "";
            tRow.innerHTML = '<td class="total-label">合計</td>';
            
            const days = ['月','火','水','木','金','土'];
            const dates = [];

            for(let i=0; i<6; i++) {
                let d = new Date(monday); d.setDate(d.getDate() + i);
                dates.push(d.toISOString().split("T")[0]);
                hRow.innerHTML += `<th>${days[i]}<br>${d.getMonth()+1}/${d.getDate()}</th>`;
            }
            document.getElementById("weekTitle").innerText = `${monday.toLocaleDateString()} ～`;

            let weekData = {};
            for(let i=0; i<6; i++) {
                let res = await fetch(`/api/slots?date=${dates[i]}`);
                weekData[i] = await res.json();
            }

            let dailyCounts = [0, 0, 0, 0, 0, 0];

            // 【ここが重要】表示したい時間を全て固定で定義する
            const allTimes = [
                "09:00","09:30","10:00","10:30","11:00","11:30","12:00",
                "14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"
            ];
            
            allTimes.forEach(time => {
                let row = `<tr><td class="time-col">${time}</td>`;
                for(let i=0; i<6; i++) {
                    const slot = weekData[i].find(s => s.time === time);
                    let cellClass = '';
                    let content = '';

                    if (slot && slot.patient_name) {
                        content = `${slot.patient_name}<br><small>${slot.part || ''}</small>`;
                        dailyCounts[i]++;
                        // ステータスが完了(done)ならピンク
                        if (slot.status === 'done' || slot.status === '完了') {
                            cellClass = 'class="done-past"';
                        }
                    }
                    row += `<td ${cellClass}>${content}</td>`;
                }
                bRows.innerHTML += row + "</tr>";
            });

            dailyCounts.forEach(count => {
                tRow.innerHTML += `<td>${count > 0 ? count + ' 件' : '0 件'}</td>`;
            });
        }

        function shiftWeek(n) { monday.setDate(monday.getDate() + (n * 7)); load(); }
        load();
    </script>
</body>
</html>
