<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MRI 1週間予約表（A4横・ジャストサイズ）</title>
    <style>
        @page { size: A4 landscape; margin: 5mm; }
        body { font-family: sans-serif; font-size: 10px; margin: 0; padding: 5px; }
        
        .no-print { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #f0f0f0; padding: 10px; border-radius: 5px; }
        .btn { padding: 6px 12px; cursor: pointer; border: 1px solid #999; background: #fff; border-radius: 4px; font-size: 12px; text-decoration: none; color: black; display: inline-block; }
        .btn:hover { background: #eee; }
        .btn-back { background: #666; color: white; border: none; }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 2px solid #000; margin-bottom: 5px; }
        th { border: 1px solid #000; background: #eee; height: 26px; font-size: 10px; }
        .time-col { font-weight: bold; background: #fafafa; }
        
        /* 💡 A4横1枚にぴったり収まる限界の高さ（36px）に調整しました */
        td { border: 1px solid #000; padding: 0; text-align: center; height: 36px; vertical-align: middle; }
        
        /* 💡 36pxの中でIDと名前が上下に綺麗に収まり、はみ出さないための配置設定 */
        .name-cell { font-weight: bold; overflow: hidden; white-space: nowrap; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; box-sizing: border-box; padding: 1px 0; }
        .patient-id-sub { font-size: 10px; font-weight: normal; color: #444; line-height: 1.1; margin-bottom: 1px; }
        .patient-name-main { font-size: 15px; font-weight: bold; line-height: 1.2; }
        
        .part-cell { font-size: 10.5px; color: #000; font-weight: bold; overflow: hidden; white-space: nowrap; }
        
        .done-past { background-color: #ffcccc !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .total-row { background-color: #f8f9fa; font-weight: bold; height: 26px; }
        .total-label { text-align: right; padding-right: 5px; }

        .extra-title { font-size: 13px; font-weight: bold; margin: 5px 0; color: #d63384; }
        .extra-row { color: #d63384; }

        /* 📄 印刷時に1ページ目と2ページ目をきれいに分けるための設定 */
        @media print { 
            .no-print { display: none; } 
            .page-break { page-break-after: always; break-after: page; }
        }
    </style>
</head>
<body>
    <div class="no-print">
        <a href="index.html" class="btn btn-back">🏠 予約管理に戻る</a>
        <div style="flex-grow: 1; text-align: center;">
            <button class="btn" onclick="shiftWeek(-1)">◀ 前の週</button>
            <span id="weekTitle" style="margin: 0 15px; font-weight:bold;"></span>
            <button class="btn" onclick="shiftWeek(1)">次の週 ▶</button>
        </div>
        <button class="btn" onclick="window.print()">🖨️ A4横で印刷</button>
    </div>

    <div id="page1Container">
        <div style="font-size: 13px; font-weight: bold; margin-bottom: 4px;">MRI検査予約表（通常枠）</div>
        <table>
            <colgroup>
                <col style="width: 50px;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
            </colgroup>
            <thead>
                <tr class="headerRow"><th class="time-col" rowspan="2">時間</th></tr>
                <tr class="subHeaderRow"></tr>
            </thead>
            <tbody id="bodyRows"></tbody>
            <tfoot>
                <tr id="totalRow" class="total-row"><td class="total-label">合計</td></tr>
            </tfoot>
        </table>
    </div>

    <div class="page-break"></div>

    <div id="page2Container">
        <div class="extra-title">MRI検査予約表（追加枠・時間外）</div>
        <table>
            <colgroup>
                <col style="width: 50px;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
                <col style="width: 12%;">  <col style="width: 3.5%;"> 
            </colgroup>
            <thead>
                <tr class="headerRow"><th class="time-col" rowspan="2">時間</th></tr>
                <tr class="subHeaderRow"></tr>
            </thead>
            <tbody id="extraBodyRows"></tbody>
        </table>
    </div>

<script>
    // 💡 日本時間に完全に合わせた安全な YYYY-MM-DD 生成関数
    function formatDateStr(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    // 💡 【超重要】時間を 00:00:00 に初期化して、時差による日付跨ぎを完全に防ぐ
    function getMonday(d) { 
        let date = new Date(d); 
        date.setHours(0, 0, 0, 0); 
        
        let dayNum = date.getDay(); 
        let distanceToMonday = dayNum === 0 ? -6 : 1 - dayNum;
        date.setDate(date.getDate() + distanceToMonday);
        return date;
    }

    let monday = getMonday(new Date());
    
    async function load() {
        const bRows = document.getElementById("bodyRows");
        const extraBRows = document.getElementById("extraBodyRows");
        const tRow = document.getElementById("totalRow");
        
        document.querySelectorAll(".headerRow").forEach(el => el.innerHTML = '<th class="time-col" rowspan="2">時間</th>');
        document.querySelectorAll(".subHeaderRow").forEach(el => el.innerHTML = '');
        bRows.innerHTML = "";
        extraBRows.innerHTML = "";
        tRow.innerHTML = '<td class="total-label">合計</td>';
        
        const days = ['月','火','水','木','金','土'];
        const dates = [];
        
        for(let i=0; i<6; i++) {
            let d = new Date(monday); 
            d.setHours(0, 0, 0, 0);
            d.setDate(d.getDate() + i);
            dates.push(formatDateStr(d)); 
            
            document.querySelectorAll(".headerRow").forEach(el => {
                el.innerHTML += `<th colspan="2">${days[i]} ${d.getMonth()+1}/${d.getDate()}</th>`;
            });
            document.querySelectorAll(".subHeaderRow").forEach(el => {
                el.innerHTML += `<th>氏名</th><th>部位</th>`;
            });
        }
        
        let saturday = new Date(monday);
        saturday.setDate(saturday.getDate() + 5);
        document.getElementById("weekTitle").innerText = `${monday.toLocaleDateString('ja-JP')} ～ ${saturday.toLocaleDateString('ja-JP')}`;

        let weekData = {};
        for(let i=0; i<6; i++) {
            let res = await fetch(`/api/slots?date=${dates[i]}`);
            weekData[i] = await res.json();
        }

        const baseTimes = ["09:00","09:30","10:00","10:30","11:00","11:30","12:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30","18:00"];
        let dailyCounts = [0, 0, 0, 0, 0, 0];

        // 📄 1ページ目：通常時間枠のデータ生成
        baseTimes.forEach(time => {
            let row = `<tr><td class="time-col">${time}</td>`;
            for(let i=0; i<6; i++) {
                const slot = weekData[i].find(s => s.time === time);
                let cellClass = '', nameContent = '', partContent = '';
                if (slot && (slot.patient_name || slot.part || slot.status === 'done')) {
                    const idStr = slot.patient_id ? `<span class="patient-id-sub">${slot.patient_id}</span>` : '';
                    const nameStr = slot.patient_name ? `<span class="patient-name-main">${slot.patient_name}</span>` : (slot.status === 'done' ? '<span class="patient-name-main">---</span>' : '');
                    nameContent = `<div class="name-cell ${cellClass}">${idStr}${nameStr}</div>`;
                    partContent = slot.part || '';
                    dailyCounts[i]++;
                    if (slot.status === 'done' || slot.status === '完了') cellClass = 'done-past';
                } else {
                    nameContent = '';
                }
                row += `<td class="${cellClass}">${nameContent}</td><td class="part-cell ${cellClass}">${partContent}</td>`;
            }
            bRows.innerHTML += row + "</tr>";
        });

        // 各曜日の追加枠データを抽出
        let maxExtras = 0;
        let extraSlotsByDay = {};
        for(let i=0; i<6; i++) {
            extraSlotsByDay[i] = weekData[i].filter(s => !baseTimes.includes(s.time) && (s.patient_name || s.part || s.status === 'done'));
            if(extraSlotsByDay[i].length > maxExtras) maxExtras = extraSlotsByDay[i].length;
        }

        // 📄 2ページ目：追加枠用のデータ生成
        if (maxExtras === 0) {
            let row = `<tr><td class="time-col extra-row">-</td>`;
            for(let i=0; i<6; i++) {
                row += `<td style="color:#aaa; font-size:12px;">なし</td><td class="part-cell"></td>`;
            }
            extraBRows.innerHTML += row + "</tr>";
        } else {
            for(let j=0; j < maxExtras; j++) {
                let row = `<tr><td class="time-col extra-row">追加枠</td>`;
                for(let i=0; i<6; i++) {
                    const slot = extraSlotsByDay[i][j];
                    let cellClass = '', nameContent = '', partContent = '';
                    if (slot) {
                        const idStr = slot.patient_id ? `<span class="patient-id-sub">${slot.patient_id}</span>` : '';
                        const nameStr = slot.patient_name ? `<span class="patient-name-main">${slot.patient_name}</span>` : (slot.status === 'done' ? '<span class="patient-name-main">---</span>' : '');
                        nameContent = `<div class="name-cell ${cellClass}">${idStr}${nameStr}</div>`;
                        partContent = slot.part || '';
                        dailyCounts[i]++;
                        if (slot.status === 'done' || slot.status === '完了') cellClass = 'done-past';
                    } else {
                        nameContent = '';
                    }
                    row += `<td class="${cellClass}">${nameContent}</td><td class="part-cell ${cellClass}">${partContent}</td>`;
                }
                extraBRows.innerHTML += row + "</tr>";
            }
        }

        // 件数合計の表示
        dailyCounts.forEach(count => { tRow.innerHTML += `<td colspan="2">${count} 件</td>`; });
    }

    function shiftWeek(n) { 
        monday.setDate(monday.getDate() + (n * 7)); 
        load(); 
    }
    load();
</script>
</body>
</html>
