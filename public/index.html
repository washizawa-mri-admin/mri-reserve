<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MRI予約管理</title>
    <style>
        :root { --waiting: #fff4e5; --scanning: #e3f2fd; --done: #e8f5e9; --remote: #fce4ec; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 950px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 15px; }
        .summary-panel { display: flex; gap: 10px; margin-bottom: 20px; }
        .summary-item { flex: 1; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; border: 1px solid #ddd; }
        .count { display: block; font-size: 1.8em; }
        .slot { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; }
        .status-waiting { background: var(--waiting) !important; border-left: 8px solid #ffa726 !important; }
        .status-scanning { background: var(--scanning) !important; border-left: 8px solid #2196f3 !important; }
        .status-done { background: var(--done) !important; border-left: 8px solid #4caf50 !important; opacity: 0.8; }
        .remote-active { background: var(--remote) !important; border: 2px solid #e91e63 !important; }
        .time { width: 110px; font-weight: bold; line-height: 1.2; }
        .patient-tag { color: #e91e63; font-size: 0.8em; font-weight: bold; }
        .actions { flex-grow: 1; text-align: right; }
        button { padding: 6px 10px; margin-left: 4px; border-radius: 4px; border: none; cursor: pointer; font-size: 0.9em; }
        .side-b.active { background: #2196f3 !important; color: white !important; }
        .btn-add { background: #673ab7; color: white; } 
        .btn-del { background: #ddd; color: #333; }
        /* 部位バッジの基本スタイル */
.part-badge {
    display: inline-block;
    padding: 2px 8px;
    margin-left: 10px;
    border-radius: 4px;
    background: #eceff1;
    color: #455a64;
    font-weight: bold;
    font-size: 0.9em;
    border: 1px solid #cfd8dc;
    vertical-align: middle;
}

/* 特定の部位で色を変える（お好みで追加） */
.part-head { background: #e1f5fe; color: #0277bd; border-color: #81d4fa; } /* 頭は水色 */
.part-spine { background: #f3e5f5; color: #7b1fa2; border-color: #ce93d8; } /* 脊椎は紫 */
.part-joint { background: #fff3e0; color: #ef6c00; border-color: #ffcc80; } /* 関節はオレンジ */
    </style>
</head>
<body>

    <div id="overlay" onclick="closePartPanel()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9998;"></div>
    <div id="part-panel" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; border:2px solid #333; padding:20px; z-index:9999; border-radius:10px; width:320px; box-shadow:0 0 20px rgba(0,0,0,0.5);">
        <h3 style="margin-top:0; text-align:center;">部位選択</h3>
        <div style="display:flex; gap:8px; margin-bottom:15px; justify-content:center;">
            <button class="side-b" id="s-L" onclick="selectSide('左')" style="padding:10px; flex:1; border:1px solid #ccc; cursor:pointer;">左</button>
            <button class="side-b" id="s-R" onclick="selectSide('右')" style="padding:10px; flex:1; border:1px solid #ccc; cursor:pointer;">右</button>
            <button class="side-b" id="s-N" onclick="selectSide('')" style="padding:10px; flex:1; border:1px solid #ccc; cursor:pointer;">なし</button>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
            <button onclick="confirmPart('頭部')" style="padding:10px; cursor:pointer;">頭部</button>
            <button onclick="confirmPart('腰椎')" style="padding:10px; cursor:pointer;">腰椎</button>
            <button onclick="confirmPart('頸椎')" style="padding:10px; cursor:pointer;">頸椎</button>
            <button onclick="confirmPart('胸椎')" style="padding:10px; cursor:pointer;">胸椎</button>
            <button onclick="confirmPart('膝')" style="padding:10px; cursor:pointer;">膝</button>
            <button onclick="confirmPart('肩')" style="padding:10px; cursor:pointer;">肩</button>
            <button onclick="confirmPart('股関節')" style="padding:10px; cursor:pointer;">股関節</button>
            <button onclick="confirmPart('足関節')" style="padding:10px; cursor:pointer;">足関節</button>
        </div>
        <button onclick="closePartPanel()" style="width:100%; margin-top:15px; padding:10px; background:#444; color:white; border:none; cursor:pointer;">キャンセル</button>
    </div>

    <div style="margin: 20px 0; text-align: center;">
        <a href="weekly.html" style="display: inline-block; background: #4caf50; color: white; padding: 12px 25px; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 1.1em; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
            📅 週間予約表を表示する
        </a>
    </div>

    <div class="card">
        <div class="header">
            <h1>MRI 予約管理</h1>
            <div style="display: flex; align-items: center;">
                <a href="search.html" style="text-decoration:none; background:#444; color:white; padding:8px 15px; border-radius:6px; margin-right:10px; font-size: 0.9em;">🔍 履歴検索</a>
                <a href="print.html" style="text-decoration:none; background:#2196f3; color:white; padding:8px 15px; border-radius:6px; margin-right:10px; font-size: 0.9em;">🖨️ 印刷</a>
                <input type="date" id="datePicker" style="padding:7px; border:1px solid #ccc; border-radius:6px;">
                <a href="report.html" style="margin-left:10px; text-decoration:none; background:#607d8b; color:white; padding:8px 15px; border-radius:6px; font-size: 0.9em;">📊 レポート</a>
            </div>
        </div>
        <div class="summary-panel">
            <div class="summary-item" style="background: var(--waiting);">待ち <span id="count-waiting" class="count">0</span></div>
            <div class="summary-item" style="background: var(--scanning);">撮影中 <span id="count-scanning" class="count">0</span></div>
            <div class="summary-item" style="background: var(--done);">終了 <span id="count-done" class="count">0</span></div>
        </div>
        <div id="list"></div>
    </div>

<script>
let currentEditId = null;
let currentSide = "";
const doctors = ["鷲澤","永野","鷲澤匠","中村","石橋","木内","白石","小谷野","鈴木"];
let today = new Date().toISOString().split("T")[0];
document.getElementById("datePicker").value = today;

function openPartPanel(id) {
    currentEditId = id;
    selectSide('');
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('part-panel').style.display = 'block';
}

function selectSide(side) {
    currentSide = side;
    document.querySelectorAll('.side-b').forEach(b => b.classList.remove('active'));
    if(side === '左') document.getElementById('s-L').classList.add('active');
    else if(side === '右') document.getElementById('s-R').classList.add('active');
    else document.getElementById('s-N').classList.add('active');
}

function confirmPart(partName) {
    if (!currentEditId) return;
    const fullPart = currentSide + partName;
    const name = document.getElementById(`name-${currentEditId}`).value;
    const pid = document.getElementById(`id-${currentEditId}`).value;

    fetch("/api/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id: currentEditId, part: fullPart, patient_name: name, patient_id: pid })
    }).then(() => {
        closePartPanel();
        load();
    });
}

function closePartPanel() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('part-panel').style.display = 'none';
    currentEditId = null;
}

function load() {
    fetch(`/api/slots?date=${today}`).then(res => res.json()).then(data => {
        const list = document.getElementById("list"); 
        list.innerHTML = "";
        let counts = { waiting: 0, scanning: 0, done: 0 };

        data.forEach(item => {
            const status = item.status || '';
            if (counts.hasOwnProperty(status)) counts[status]++;
            
            const div = document.createElement("div");
            div.className = `slot status-${status} ${item.is_remote ? 'remote-active' : ''}`;
            
            const idValue = item.patient_id || "";
            const nameValue = item.patient_name || "";
            const partValue = item.part ? ` [${item.part}]` : "";
            
            div.innerHTML = `
                <div class="time">${item.time}${item.is_remote ? '<br><span class="patient-tag">読影出</span>' : ''}</div>
                <div class="actions">
                    <input type="text" value="${idValue}" placeholder="ID" id="id-${item.id}" style="padding:5px; width:70px; margin-right:5px; border:1px solid #ccc; border-radius:4px;">
                    <input type="text" value="${nameValue}" placeholder="名前" id="name-${item.id}" onkeydown="if(event.key==='Enter') updateWithOption(${item.id}, 'waiting')" style="padding:5px; width:130px; margin-right:5px; border:1px solid #ccc; border-radius:4px;">
                    <span style="font-size:0.8em; color:#666; margin-right:10px;">${partValue}</span>

                    <button onclick="openPartPanel(${item.id})" style="background:#607d8b; color:white; font-weight:bold;">部位</button>

                    Dr: <select onchange="update(${item.id}, null, this.value)">
                        <option value="">--</option>
                        ${doctors.map(d => `<option value="${d}" ${item.doctor===d?'selected':''}>${d}</option>`).join("")}
                    </select>
                    <button onclick="updateWithOption(${item.id}, 'waiting')" style="background:#ffa726;color:white">待ち</button>
                    <button onclick="startWithOption(${item.id})" style="background:#2196f3;color:white">開始</button>
                    <button onclick="finishScan(${item.id})" style="background:#4caf50;color:white">終了</button>
                    <button onclick="requestRemote(${item.id})" style="background:#e91e63;color:white">読影</button>
                    <button class="btn-add" onclick="addSlot()">＋</button>
                    <button class="btn-del" onclick="deleteSlot(${item.id})">削</button>
                </div>`;
            list.appendChild(div);
        });
        document.getElementById("count-waiting").innerText = counts.waiting;
        document.getElementById("count-scanning").innerText = counts.scanning;
        document.getElementById("count-done").innerText = counts.done;
    });
}

function update(id, status, doctor) {
    const body = { id, doctor };
    if (status !== null) body.status = status;
    fetch("/api/update", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) }).then(load); 
}

function updateWithOption(id, status) {
    const name = document.getElementById(`name-${id}`)?.value;
    const pid = document.getElementById(`id-${id}`)?.value;
    fetch("/api/update", { 
        method: "POST", headers: {"Content-Type":"application/json"}, 
        body: JSON.stringify({id, status, patient_name: name, patient_id: pid}) 
    }).then(load);
}

function startWithOption(id) {
    const name = document.getElementById(`name-${id}`)?.value;
    const pid = document.getElementById(`id-${id}`)?.value;
    fetch("/api/start", { 
        method: "POST", headers: {"Content-Type":"application/json"}, 
        body: JSON.stringify({id, patient_name: name, patient_id: pid}) 
    }).then(load);
}

function finishScan(id) { 
    const name = document.getElementById(`name-${id}`)?.value || "受診済";
    const pid = document.getElementById(`id-${id}`)?.value || "";
    fetch("/api/update", { 
        method: "POST", headers: {"Content-Type":"application/json"}, 
        body: JSON.stringify({id, status: 'done', patient_name: name, patient_id: pid}) 
    }).then(load); 
}

function requestRemote(id) {
    const pid = prompt("患者ID"); if(!pid) return;
    let pname = prompt("苗字(カタカナ)"); if(!pname) return;
    fetch("/api/remote", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({id, patient_id: pid, patient_name: pname}) }).then(load);
}

// JavaScript内の deleteSlot 関数を書き換え
function deleteSlot(id) { 
    if(confirm("入力内容をリセットして空枠に戻しますか？")) {
        fetch("/api/delete", { 
            method: "POST", 
            headers: {"Content-Type":"application/json"}, 
            body: JSON.stringify({id}) 
        }).then(load); 
    }
}

function addSlot() {
    fetch("/api/add", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ date: today }) }).then(load);
}

document.getElementById("datePicker").addEventListener("change", e => { today = e.target.value; load(); });
load();
setInterval(load, 30000);
</script>
</body>
</html>
