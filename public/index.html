<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MRI予約管理</title>
    <style>
        :root { --waiting: #fff4e5; --scanning: #e3f2fd; --done: #e8f5e9; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 1050px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .slot { display: flex; align-items: center; padding: 12px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 8px; background: white; }
        .status-waiting { background: var(--waiting) !important; border-left: 8px solid #ffa726 !important; }
        .status-done { background: var(--done) !important; border-left: 8px solid #4caf50 !important; }
        .actions { flex-grow: 1; text-align: right; }
        input { padding: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; margin-left: 4px; border-radius: 4px; border: none; cursor: pointer; }
        
        /* 部位選択パネル：絶対に最前面にくるように設定 */
        #part-panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 3px solid #333; padding: 25px; z-index: 99999;
            border-radius: 15px; box-shadow: 0 0 50px rgba(0,0,0,0.8); width: 350px;
        }
        .panel-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99998; }
        
        .part-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-select { background: #f8f9fa; border: 2px solid #ddd; padding: 12px; font-size: 1.1em; border-radius: 6px; }
        .btn-select:active { background: #e0e0e0; }
        .btn-select.active-side { background: #2196f3 !important; color: white !important; border-color: #0d47a1; }
    </style>
</head>
<body>

<div class="card">
    <div id="list"></div>
</div>

<div id="overlay" class="panel-overlay" onclick="closePartPanel()"></div>
<div id="part-panel">
    <h3 style="margin:0 0 15px 0; text-align:center;">部位を選んでください</h3>
    <div style="display:flex; gap:10px; margin-bottom:20px; justify-content:center;">
        <button class="btn-select side-opt" id="opt-L" onclick="selectSide('左')">左</button>
        <button class="btn-select side-opt" id="opt-R" onclick="selectSide('右')">右</button>
        <button class="btn-select side-opt active-side" id="opt-N" onclick="selectSide('')">なし</button>
    </div>
    <div class="part-grid" id="part-button-container">
        </div>
    <button onclick="closePartPanel()" style="width:100%; background:#666; color:white; margin-top:20px; padding:12px;">キャンセル</button>
</div>

<script>
const partsList = ["頭部", "腰椎", "頸椎", "胸椎", "膝", "肩", "股関節", "手関節", "足関節", "腹部"];
let currentId = null;
let currentSide = "";
let today = new Date().toISOString().split("T")[0];

function load() {
    fetch(`/api/slots?date=${today}`).then(res => res.json()).then(data => {
        const list = document.getElementById("list");
        list.innerHTML = "";
        data.forEach(item => {
            const div = document.createElement("div");
            div.className = `slot status-${item.status || ''}`;
            div.innerHTML = `
                <div style="width:100px; font-weight:bold;">${item.time === 'EXTRA' ? '追加枠' : item.time}</div>
                <div class="actions">
                    <input type="text" value="${item.patient_id || ''}" id="id-${item.id}" placeholder="ID" style="width:60px;">
                    <input type="text" value="${item.patient_name || ''}" id="name-${item.id}" placeholder="名前" style="width:120px;">
                    <span style="color:red; font-weight:bold; margin:0 10px;">${item.part ? '【'+item.part+'】' : ''}</span>
                    
                    <button style="background:#607d8b; color:white;" onclick="openPartPanel(${item.id})">部位</button>
                    
                    <button onclick="save(${item.id}, 'waiting')" style="background:#ffa726; color:white;">待ち</button>
                    <button onclick="save(${item.id}, 'done')" style="background:#4caf50; color:white;">終了</button>
                    <button onclick="addSlot()" style="background:#673ab7; color:white;">＋</button>
                </div>`;
            list.appendChild(div);
        });
    });
}

// パネルを開く
function openPartPanel(id) {
    currentId = id;
    selectSide(''); // 毎回「なし」にリセット
    
    // パネル内の部位ボタンを動的に生成（確実にこの時点でのIDを紐付ける）
    const container = document.getElementById('part-button-container');
    container.innerHTML = partsList.map(p => `
        <button class="btn-select" onclick="confirmPart('${p}')">${p}</button>
    `).join("");

    document.getElementById('overlay').style.display = 'block';
    document.getElementById('part-panel').style.display = 'block';
}

function selectSide(side) {
    currentSide = side;
    document.querySelectorAll('.side-opt').forEach(el => el.classList.remove('active-side'));
    if(side === '左') document.getElementById('opt-L').classList.add('active-side');
    else if(side === '右') document.getElementById('opt-R').classList.add('active-side');
    else document.getElementById('opt-N').classList.add('active-side');
}

function confirmPart(partName) {
    if(!currentId) return;
    
    const finalPart = currentSide + partName;
    const pName = document.getElementById(`name-${currentId}`).value;
    const pId = document.getElementById(`id-${currentId}`).value;

    fetch("/api/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            id: currentId,
            part: finalPart,
            patient_name: pName,
            patient_id: pId
        })
    }).then(() => {
        closePartPanel();
        load();
    });
}

function closePartPanel() {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('part-panel').style.display = 'none';
    currentId = null;
}

function save(id, status) {
    const name = document.getElementById(`name-${id}`).value;
    const pid = document.getElementById(`id-${id}`).value;
    fetch("/api/update", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ id, status, patient_name: name, patient_id: pid })
    }).then(load);
}

function addSlot() {
    fetch("/api/add", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ date: today, time: "EXTRA" }) }).then(load);
}

load();
</script>
</body>
</html>
