<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドクター別撮影件数（印刷用）</title>
    <style>
        /* A4縦に最適化 */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; padding: 10px; background: #fff; color: #333; font-size: 11px; line-height: 1.2; }
        .container { max-width: 800px; margin: auto; }
        
        .no-print { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: #f8f9fa; padding: 10px; border-radius: 6px; }
        @media print { .no-print { display: none; } body { padding: 0; } }

        h1 { font-size: 16px; margin: 0; text-align: center; }
        
        .month-selector { font-size: 12px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; table-layout: fixed; }
        th, td { border: 1px solid #000; padding: 4px 2px; text-align: center; overflow: hidden; }
        
        th { background: #eee; font-size: 10px; }
        
        .date-col { width: 45px; font-weight: bold; background: #f9f9f9; }
        .total-col { width: 50px; font-weight: bold; background: #f9f9f9; }
        
        .today-row { background: #fff9c4 !important; }
        .total-row { background: #eee; font-weight: bold; }
        
        .count-cell { color: #000; font-weight: bold; }
        .zero { color: #ccc; } /* 0件は薄くして目立たせない */

        .nav-btn { padding: 5px 10px; background: #007bff; color: white; text-decoration: none; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print">
        <a href="index.html" class="nav-btn">⬅ 戻る</a>
        <div class="month-selector">
            表示月: <input type="month" id="monthPicker" onchange="loadData()">
        </div>
    </div>

    <h1 id="title-text">MRI撮影件数 集計表</h1>

    <table>
        <thead>
            <tr id="header-row"></tr>
        </thead>
        <tbody id="stats-body"></tbody>
    </table>
</div>

<script>
    // 元の並び順とドクターリストを完全維持
    const doctorOrder = ["鷲澤", "永野", "鷲澤匠", "河本", "石橋", "木内", "白石", "小谷野", "鈴木", "非常勤"];
    let allData = [];

    window.onload = async function() {
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
        document.getElementById('monthPicker').value = `${currentYear}-${currentMonth}`;

        await loadData();
    };

    // 表示月が切り替わるたびに、その月の正確なデータを取得し直す安全設計
    async function loadData() {
        const selectedMonth = document.getElementById('monthPicker').value;
        if (!selectedMonth) return;

        try {
            // 💡 データのドロップが起きない、信頼性の高い一括レポートAPIへ接続先を変更
            const res = await fetch(`/api/report/all?month=${selectedMonth}&_ts=${Date.now()}`);
            allData = await res.json();
            renderStats(selectedMonth);
        } catch (e) { 
            console.error("データ読み込み失敗:", e); 
        }
    }

    function renderStats(selectedMonth) {
        const [targetYear, targetMonth] = selectedMonth.split('-').map(Number);
        document.getElementById('title-text').innerText = `${targetYear}年${targetMonth}月 MRI撮影件数 集計表`;
        
        // ヘッダー作成
        const hrow = document.getElementById('header-row');
        hrow.innerHTML = `<th class="date-col">日付</th>` + 
                         doctorOrder.map(dr => `<th>${dr}</th>`).join('') + 
                         `<th class="total-col">合計</th>`;

        const daysInMonth = new Date(targetYear, targetMonth, 0).getDate();
        
        // 日付ごと・ドクターごとの集計マップを初期化
        const dailyMap = {};
        for (let i = 1; i <= daysInMonth; i++) {
            dailyMap[i] = {};
            doctorOrder.forEach(dr => dailyMap[i][dr] = 0);
        }

        // 💡 取得した生データをフロント側で1行ずつ確実に加算処理（上書きを完全防止）
        allData.forEach(d => {
            if (!d.date || !d.doctor) return;
            const parts = d.date.split('-');
            if (parts.length !== 3) return;
            
            const y = Number(parts[0]);
            const m = Number(parts[1]);
            const dayNum = Number(parts[2]);

            // 選択された月の日付のみをマッピング
            if (y === targetYear && m === targetMonth && dayNum >= 1 && dayNum <= daysInMonth) {
                let drName = d.doctor.trim();
                
                // マスターリストに存在しない名前、または空文字の場合は「非常勤」枠へ
                if (!doctorOrder.includes(drName)) {
                    drName = "非常勤";
                }
                
                // 1行＝1件、もしくは移行データの塊数値（count）をそのまま安全に加算
                const countAmt = Number(d.count) || 1;
                dailyMap[dayNum][drName] += countAmt;
            }
        });
        
        let tableHtml = "";
        let drMonthlyTotals = {};
        doctorOrder.forEach(dr => drMonthlyTotals[dr] = 0);
        let grandTotal = 0;

        const t = new Date();
        const tYear = t.getFullYear();
        const tMonth = t.getMonth() + 1;
        const tDay = t.getDate();

        // 1日〜月末までのメイン描画ループ
        for (let i = 1; i <= daysInMonth; i++) {
            const isToday = (targetYear === tYear && targetMonth === tMonth && i === tDay);
            
            let dayTotal = 0;
            let rowHtml = `<tr class="${isToday ? 'today-row' : ''}"><td class="date-col">${i}日</td>`;

            doctorOrder.forEach(dr => {
                const count = dailyMap[i][dr];
                
                rowHtml += `<td class="${count === 0 ? 'zero' : 'count-cell'}">${count === 0 ? '-' : count}</td>`;
                dayTotal += count;
                drMonthlyTotals[dr] += count;
            });

            rowHtml += `<td class="total-col">${dayTotal}</td></tr>`;
            tableHtml += rowHtml;
            grandTotal += dayTotal;
        }

        // 最下部の合計行の組み立て
        let totalRowHtml = `<tr class="total-row"><td class="date-col">合計</td>`;
        doctorOrder.forEach(dr => {
            totalRowHtml += `<td>${drMonthlyTotals[dr]}</td>`;
        });
        totalRowHtml += `<td class="total-col">${grandTotal}</td></tr>`;
        
        document.getElementById('stats-body').innerHTML = tableHtml + totalRowHtml;
    }
</script>
</body>
</html>
