<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドクター別集計</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #eee; }
        .nav-btn {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

    <a href="index.html" class="nav-btn">⬅ 予約一覧に戻る</a>

    <h1>ドクター別集計一覧</h1>
    
    <table id="target">
        <thead>
            <tr><th>日付</th><th>ドクター名</th><th>撮影件数</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        fetch('/api/report/doctors')
            .then(res => res.json())
            .then(data => {
                document.querySelector('#target tbody').innerHTML = data.map(r => 
                    `<tr><td>${r.date}</td><td>${r.doctor} 先生</td><td><strong>${r.count}</strong> 件</td></tr>`
                ).join('');
            });
    </script>
</body>
</html>
