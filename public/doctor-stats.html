<script>
    const doctorOrder = ["鷲澤", "永野", "鷲澤匠","河本", "石橋", "木内", "白石", "小谷野", "鈴木", "非常勤"];
    let allData = [];

    // 初期値の月を設定
    const now = new Date();
    const currentYear = now.getFullYear();
    const currentMonth = String(now.getMonth() + 1).padStart(2, '0');
    document.getElementById('monthPicker').value = `${currentYear}-${currentMonth}`;

    async function loadData() {
        try {
            const res = await fetch(`/api/report/doctors?_ts=${Date.now()}`);
            allData = await res.json();
            renderStats();
        } catch (e) { 
            console.error("データ読み込み失敗:", e); 
        }
    }

    function renderStats() {
        const selectedMonth = document.getElementById('monthPicker').value;
        if (!selectedMonth) return;
        
        const [targetYear, targetMonth] = selectedMonth.split('-').map(Number);
        document.getElementById('title-text').innerText = `${targetYear}年${targetMonth}月 MRI撮影件数 集計表`;
        
        // ヘッダー作成
        const hrow = document.getElementById('header-row');
        hrow.innerHTML = `<th class="date-col">日付</th>` + 
                         doctorOrder.map(dr => `<th>${dr}</th>`).join('') + 
                         `<th class="total-col">合計</th>`;

        const daysInMonth = new Date(targetYear, targetMonth, 0).getDate();
        
        let tableHtml = "";
        let drMonthlyTotals = {};
        doctorOrder.forEach(dr => drMonthlyTotals[dr] = 0);
        let grandTotal = 0;

        // 💡 今日の日付を「YYYY-MM-DD」形式で確実に取得（ゼロパディングなしの比較用）
        const t = new Date();
        const tYear = t.getFullYear();
        const tMonth = t.getMonth() + 1;
        const tDay = t.getDate();

        for (let i = 1; i <= daysInMonth; i++) {
            // 💡 安全な比較方法に修正
            const isToday = (targetYear === tYear && targetMonth === tMonth && i === tDay);
            
            let dayTotal = 0;
            let rowHtml = `<tr class="${isToday ? 'today-row' : ''}"><td class="date-col">${i}日</td>`;

            doctorOrder.forEach(dr => {
                const record = allData.find(d => {
                    if (!d.date || d.doctor !== dr) return false;
                    
                    const parts = d.date.split('-');
                    if (parts.length !== 3) return false;
                    
                    // 文字列を数値に変換して比較（これで桁数のズレを完全吸収）
                    return Number(parts[0]) === targetYear && 
                           Number(parts[1]) === targetMonth && 
                           Number(parts[2]) === i;
                });

                const count = record ? Number(record.count) : 0;
                
                rowHtml += `<td class="${count === 0 ? 'zero' : 'count-cell'}">${count}</td>`;
                dayTotal += count;
                drMonthlyTotals[dr] += count;
            });

            rowHtml += `<td class="total-col">${dayTotal}</td></tr>`;
            tableHtml += rowHtml;
            grandTotal += dayTotal;
        }

        // 合計行
        let totalRowHtml = `<tr class="total-row"><td class="date-col">合計</td>`;
        doctorOrder.forEach(dr => {
            totalRowHtml += `<td>${drMonthlyTotals[dr]}</td>`;
        });
        totalRowHtml += `<td class="total-col">${grandTotal}</td></tr>`;
        
        document.getElementById('stats-body').innerHTML = tableHtml + totalRowHtml;
    }

    window.onload = loadData;
</script>
