<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドクター別・日別集計一覧</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { padding: 8px 16px; background: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
        
        /* 月選択のスタイル */
        .month-selector { margin-bottom: 20px; padding: 10px; background: #e9ecef; border-radius: 8px; display: flex; align-items: center; gap: 10px; }
        select { padding: 8px; font-size: 1em; border-radius: 4px; border: 1px solid #ccc; }

        /* 横並びテーブルのスタイル */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 600px; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; }
        th { background: #6c757d; color: white; white-space: nowrap; }
        .date-col { background: #f8f9fa; font-weight: bold; width: 120px; }
        .today-row { background: #fff9c4 !important; }
        .total-row { background: #e8f5e9; font-weight: bold; }
        .count-cell { font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-header">
        <a href="index.html" class="nav-btn">⬅ 予約一覧に戻る</a>
        <h1>ドクター別撮影件数</h1>
    </div>

    <div class="month-selector">
        <label for="monthPicker">表示月を選択:</label>
        <input type="month" id="monthPicker" onchange="renderStats()">
    </div>

    <div class="table-wrapper">
        <table id="statsTable">
            <thead>
                <tr id="header-row">
                    </tr>
            </thead>
            <tbody id="stats-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    let allData = [];

    // 今日の年月をデフォルトセット
    const now = new Date();
    const defaultMonth = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, '0');
    document.getElementById('monthPicker').value = defaultMonth;

    async function loadData() {
        try {
            const res = await fetch('/api/report/doctors');
            allData = await res.json();
            renderStats();
        } catch (e) {
            console.error("データ取得エラー:", e);
        }
    }

    function renderStats() {
        const selectedMonth = document.getElementById('monthPicker').value; // "2026-04"
        const tbody = document.getElementById('stats-body');
        const hrow = document.getElementById('header-row');
        
        // 1. その月のデータだけ抽出
        const filteredData = allData.filter(d => d.date.startsWith(selectedMonth));

        // 2. ユニークなドクター一覧を作成
        const doctorList = [...new Set(allData.map(d => d.doctor))].sort();

        // ヘッダー作成
        hrow.innerHTML = `<th class="date-col">日付</th>` + 
                         doctorList.map(dr => `<th>${dr} 先生</th>`).join('') + 
                         `<th>日別合計</th>`;

        // 3. その月の日数を取得
        const [year, month] = selectedMonth.split('-').map(Number);
        const daysInMonth = new Date(year, month, 0).getDate();

        let tableHtml = "";
        let doctorTotals = {}; // ドクターごとの月間合計
        doctorList.forEach(dr => doctorTotals[dr] = 0);
        let grandTotal = 0;

        // 4. 1日から末日までループ
        for (let i = 1; i <= daysInMonth; i++) {
            const dateStr = `${selectedMonth}-${String(i).padStart(2, '0')}`;
            const isToday = dateStr === new Date().toISOString().split('T')[0];
            
            let rowHtml = `<tr class="${isToday ? 'today-row' : ''}"><td class="date-col">${i}日</td>`;
            let dayTotal = 0;

            doctorList.forEach(dr => {
                const record = filteredData.find(d => d.date === dateStr && d.doctor === dr);
                const count = record ? record.count : 0;
                rowHtml += `<td class="count-cell">${count > 0 ? count : '-'}</td>`;
                dayTotal += count;
                doctorTotals[dr] += count;
            });

            rowHtml += `<td>${dayTotal}</td></tr>`;
            tableHtml += rowHtml;
            grandTotal += dayTotal;
        }

        // 5. 一番下の合計行
        let totalRowHtml = `<tr class="total-row"><td class="date-col">合計</td>`;
        doctorList.forEach(dr => {
            totalRowHtml += `<td>${doctorTotals[dr]}</td>`;
        });
        totalRowHtml += `<td>${grandTotal}</td></tr>`;
        
        tbody.innerHTML = tableHtml + totalRowHtml;
    }

    window.onload = loadData;
    setInterval(loadData, 60000); // 1分更新
</script>

</body>
</html>
