<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>患者予約履歴検索</title>
    <style>
        /* 背景色を維持 */
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; margin: 0; }
        
        .card { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        h1 { border-bottom: 2px solid #444; padding-bottom: 10px; font-size: 1.5em; margin-top: 0; }
        
        .search-box { margin-bottom: 20px; display: flex; gap: 10px; }
        
        /* 入力欄のズーム防止（16px）とスマホでの打ちやすさ */
        input { 
            flex-grow: 1; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            font-size: 16px; /* iPhoneでのズーム防止 */
            box-sizing: border-box;
        }
        
        button { 
            padding: 10px 20px; 
            background: #444; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            white-space: nowrap; /* ボタン文字の折り返し防止 */
        }
        
        .history-item { background: #fff; border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        .date { font-weight: bold; color: #2196f3; font-size: 1.1em; }
        .back-link { display: inline-block; margin-top: 20px; color: #666; text-decoration: none; }

        /* スマホ専用の微調整 */
        @media (max-width: 600px) {
            body { padding: 10px; } /* 余白を少し狭く */
            
            .card { padding: 15px; border-radius: 8px; }
            
            h1 { font-size: 1.2em; }
            
            /* 検索ボックスを横並びのまま、ボタンを少し大きく */
            button { padding: 10px 15px; }

            /* 履歴アイテムの文字を少し見やすく */
            .history-item { padding: 12px; font-size: 0.95em; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔍 患者予約履歴検索</h1>
        <div class="search-box">
            <input type="text" id="idInput" placeholder="患者IDを入力" onkeydown="if(event.key==='Enter') doSearch()">
            <button onclick="doSearch()">検索</button>
        </div>
        <div id="resultList"></div>
        <a href="index.html" class="back-link">← 当日予約一覧に戻る</a>
    </div>

    <script>
        async function doSearch() {
            const id = document.getElementById("idInput").value;
            if (!id) return;
            
            // 検索中であることを示す（スマホだと反応が分かりにくいので）
            const list = document.getElementById("resultList");
            list.innerHTML = "<p>検索中...</p>";

            try {
                const res = await fetch(`/api/search?id=${id}`);
                const data = await res.json();
                list.innerHTML = "";

                if (data.length === 0) {
                    list.innerHTML = "<p>該当する履歴はありません。</p>";
                    return;
                }

                data.forEach(h => {
                    const div = document.createElement("div");
                    div.className = "history-item";
                    div.innerHTML = `
                        <div class="date">${h.date} ${h.time}</div>
                        <div style="margin: 5px 0;"><strong>部位:</strong> ${h.part || '未設定'}</div>
                        <div style="margin: 5px 0;"><strong>担当Dr:</strong> ${h.doctor || '--'}</div>
                        <div style="color:#888; font-size:0.9em; margin-top:5px;">ステータス: ${h.status === 'done' ? '✅終了' : '🕒予約中'}</div>
                    `;
                    list.appendChild(div);
                });
            } catch (err) {
                list.innerHTML = "<p>エラーが発生しました。通信状況を確認してください。</p>";
                console.error("検索エラー:", err);
            }
        }
    </script>
</body>
</html>
